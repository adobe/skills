<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" role="img" aria-label="Stardust pipeline: brand, briefings, wireframes, prototype">
  <defs>
    <radialGradient id="pBg" cx="50%" cy="50%" r="70%">
      <stop offset="0" stop-color="#141b3a"/>
      <stop offset="1" stop-color="#0a1024"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="280" fill="url(#pBg)" rx="16"/>

  <!-- dust -->
  <g fill="#f5f0e6">
    <circle cx="60" cy="40" r="1" opacity="0.2"/>
    <circle cx="1140" cy="50" r="1" opacity="0.2"/>
    <circle cx="1160" cy="240" r="0.9" opacity="0.18"/>
    <circle cx="50" cy="230" r="0.9" opacity="0.18"/>
    <circle cx="500" cy="30" r="0.8" opacity="0.16"/>
    <circle cx="700" cy="250" r="0.8" opacity="0.16"/>
  </g>

  <!-- Arrows between stages -->
  <g stroke="#e8b95e" stroke-width="1.2" opacity="0.35" fill="none">
    <line x1="240" y1="140" x2="360" y2="140"/>
    <line x1="540" y1="140" x2="660" y2="140"/>
    <line x1="840" y1="140" x2="960" y2="140"/>
  </g>
  <g fill="#e8b95e" opacity="0.5">
    <polygon points="360,136 368,140 360,144"/>
    <polygon points="660,136 668,140 660,144"/>
    <polygon points="960,136 968,140 960,144"/>
  </g>

  <!-- Stage 1: BRAND (palette swatches) -->
  <g transform="translate(150, 140)">
    <g>
      <rect x="-45" y="-28" width="18" height="56" rx="3" fill="#2d3a68"/>
      <rect x="-23" y="-28" width="18" height="56" rx="3" fill="#e8b95e"/>
      <rect x="-1" y="-28" width="18" height="56" rx="3" fill="#d4845a"/>
      <rect x="21" y="-28" width="18" height="56" rx="3" fill="#f5f0e6"/>
    </g>
    <text x="0" y="72" font-family="ui-monospace, Menlo, monospace" font-size="11" letter-spacing="2" fill="#e8b95e" text-anchor="middle">01  BRAND</text>
    <text x="0" y="94" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#f5f0e6" opacity="0.55" text-anchor="middle">palette · voice</text>
  </g>

  <!-- Stage 2: BRIEFINGS (doc lines) -->
  <g transform="translate(450, 140)">
    <g stroke="#f5f0e6" stroke-linecap="round">
      <line x1="-40" y1="-28" x2="40" y2="-28" stroke-width="3.5"/>
      <line x1="-40" y1="-14" x2="24" y2="-14" stroke-width="2" opacity="0.7"/>
      <line x1="-40" y1="-2" x2="36" y2="-2" stroke-width="2" opacity="0.7"/>
      <line x1="-40" y1="10" x2="20" y2="10" stroke-width="2" opacity="0.7"/>
      <line x1="-40" y1="22" x2="32" y2="22" stroke-width="2" opacity="0.7"/>
    </g>
    <text x="0" y="72" font-family="ui-monospace, Menlo, monospace" font-size="11" letter-spacing="2" fill="#e8b95e" text-anchor="middle">02  BRIEFINGS</text>
    <text x="0" y="94" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#f5f0e6" opacity="0.55" text-anchor="middle">intent · audience · CTAs</text>
  </g>

  <!-- Stage 3: WIREFRAMES (grey blocks) -->
  <g transform="translate(750, 140)">
    <g fill="#f5f0e6" opacity="0.22">
      <rect x="-40" y="-30" width="80" height="10"/>
      <rect x="-40" y="-14" width="40" height="28"/>
      <rect x="4" y="-14" width="36" height="12"/>
      <rect x="4" y="2" width="36" height="12"/>
      <rect x="-40" y="22" width="80" height="8"/>
    </g>
    <text x="0" y="72" font-family="ui-monospace, Menlo, monospace" font-size="11" letter-spacing="2" fill="#e8b95e" text-anchor="middle">03  WIREFRAMES</text>
    <text x="0" y="94" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#f5f0e6" opacity="0.55" text-anchor="middle">structure · rhythm</text>
  </g>

  <!-- Stage 4: PROTOTYPE (the star) -->
  <g transform="translate(1050, 140)">
    <g fill="#e8b95e">
      <rect x="-4" y="-36" width="8" height="8"/>
      <rect x="-4" y="-26" width="8" height="8" opacity="0.7"/>
      <rect x="-4" y="18" width="8" height="8" opacity="0.7"/>
      <rect x="-4" y="28" width="8" height="8"/>
      <rect x="-36" y="-4" width="8" height="8"/>
      <rect x="-26" y="-4" width="8" height="8" opacity="0.7"/>
      <rect x="18" y="-4" width="8" height="8" opacity="0.7"/>
      <rect x="28" y="-4" width="8" height="8"/>
    </g>
    <rect x="-10" y="-10" width="20" height="20" fill="#ffd98a"/>
    <g fill="#e8b95e" opacity="0.55">
      <rect x="-20" y="-20" width="6" height="6"/>
      <rect x="14" y="-20" width="6" height="6"/>
      <rect x="-20" y="14" width="6" height="6"/>
      <rect x="14" y="14" width="6" height="6"/>
    </g>
    <text x="0" y="72" font-family="ui-monospace, Menlo, monospace" font-size="11" letter-spacing="2" fill="#ffd98a" text-anchor="middle">04  PROTOTYPE</text>
    <text x="0" y="94" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#f5f0e6" opacity="0.55" text-anchor="middle">branded HTML pages</text>
  </g>

  <!-- seed footnote -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="10" letter-spacing="1.5" fill="#e8b95e" opacity="0.45">
    <text x="600" y="30" text-anchor="middle">md5(brand · today)  →  a3f7c92e · decade 1970s · craft letterpress · register editorial</text>
  </g>
</svg>
